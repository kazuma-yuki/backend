services:
  api:
    build: .
    ports:
      - "8471:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://garage:ayambakar123@db:5432/garage_pi
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: garage
      POSTGRES_PASSWORD: ayambakar123
      POSTGRES_DB: garage_pi
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garage -d garage_pi"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
